name: DiscordHookSRV
version: 1.0.1
main: me.discordhooksrv.DiscordHookSRV
api-version: '1.21'

author: ArchiveAustin

description: Discord bot integration with account linking, permanent link storage, configurable !ip and !online embeds, and automatic updates.

commands:
  link:
    description: Link your Minecraft account to Discord
    usage: /link <code>
    permission: discordhooksrv.link
    permission-message: ""

  discordhooksrv:
    description: DiscordHookSRV admin command
    usage: /dhs reload
    permission: discordhooksrv.admin

permissions:
  discordhooksrv.link:
    description: Allows players to use /link
    default: true

  discordhooksrv.admin:
    description: Allows admin DiscordHookSRV commands
    default: op
