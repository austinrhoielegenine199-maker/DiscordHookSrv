# ============================================================
# DiscordHookSRV
# Made By ArchiveAustin
# ============================================================

discord:

  # Your Discord bot token.
  #
  # NEVER SHARE THIS TOKEN.
  bot-token: "PASTE_BOT_TOKEN_HERE"


# ============================================================
# AUTOMATIC UPDATER
# ============================================================

updater:

  enabled: true


# ============================================================
# !IP COMMAND
# ============================================================

ip:

  enabled: true

  command: "!ip"

  embed:

    title: "🌐 NyrethaSMP"

    description: "Join our Minecraft server!"

    color: "#00AAFF"

    fields:

      - name: "Server IP"
        value: "play.example.com"
        inline: true

      - name: "Port"
        value: "25565"
        inline: true

    footer: "Made By ArchiveAustin"


# ============================================================
# !ONLINE COMMAND
# ============================================================

online:

  enabled: true

  command: "!online"

  embed:

    title: "Server Status"

    description: "%status% **%online%/%max_players% players online**"

    color: "%status_color%"

    fields:

      - name: "Players Online"
        value: "%online%/%max_players%"
        inline: true

      - name: "Status"
        value: "%status%"
        inline: true

    footer: "Made By ArchiveAustin"


# ============================================================
# STATUS SETTINGS
# ============================================================

status:

  online:

    text: "🟢 Online"

    color: "#00FF00"

  offline:

    text: "🔴 Offline"

    color: "#FF0000"


# ============================================================
# GENERAL SETTINGS
# ============================================================

settings:

  ignore-bots: true


# ============================================================
# ACCOUNT LINKING
# ============================================================

linking:

  enabled: true

  # Linking code expiration time in seconds.
  code-expiry-seconds: 300

  # Maximum wrong attempts before the code is locked.
  max-attempts: 5

  # How long the code is locked after too many failed attempts.
  lockout-seconds: 300

  # Discord role ID given to linked users.
  verified-role-id: "PASTE_VERIFIED_ROLE_ID_HERE"

  # Change Discord nickname to Minecraft username.
  force-minecraft-nickname: true

  # Change nickname back if the user manually changes it.
  prevent-nickname-changes: true

  messages:

    discord-code: |
      🔗 **Account Linking**

      Your linking code is:

      `%code%`

      Join the Minecraft server and type:

      `/link %code%`

      This code expires in 5 minutes.

    discord-already-linked: "❌ Your Discord account is already linked to a Minecraft account."

    minecraft-success: "&a&l✓ &aYour Minecraft account has been linked to Discord!"

    minecraft-invalid-code: "&cThat linking code is invalid or expired."

    minecraft-locked: "&cToo many failed attempts. Please try again later."

    minecraft-mc-already-linked: "&cYour Minecraft account is already linked to Discord."

    minecraft-discord-already-linked: "&cThat Discord account is already linked to a Minecraft account."
